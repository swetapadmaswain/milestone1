<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 Restaurant Recommender</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7fb; color: #222; }
    .card { background: #fff; border-radius: 8px; padding: 16px; max-width: 900px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    label { display: block; font-size: 14px; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 14px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
    button.secondary { background: #475569; margin-left: 8px; }
    .meta { margin: 12px 0; font-size: 14px; color: #334155; }
    .item { border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; margin-bottom: 8px; background: #fafafa; }
    .warn { color: #b45309; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Phase 1: Restaurant Recommendation</h2>
    <p>Use this basic web UI to provide preference input and get top recommendations.</p>

    <div style="margin-bottom: 16px;">
      <button id="ingestBtn" class="secondary">Run Ingestion</button>
      <span id="ingestStatus" class="meta"></span>
    </div>

    <div class="row">
      <div>
        <label for="location">Location</label>
        <input id="location" value="bangalore" />
      </div>
      <div>
        <label for="budget">Budget</label>
        <select id="budget">
          <option value="low">low</option>
          <option value="medium" selected>medium</option>
          <option value="high">high</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label for="cuisine">Preferred Cuisine</label>
        <input id="cuisine" value="north indian" />
      </div>
      <div>
        <label for="minRating">Minimum Rating</label>
        <input id="minRating" type="number" value="3.5" min="0" max="5" step="0.1" />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="topN">Top N</label>
        <input id="topN" type="number" value="5" min="1" max="20" />
      </div>
      <div>
        <label for="addPrefs">Additional Preferences (comma separated)</label>
        <input id="addPrefs" placeholder="family-friendly, fast service" />
      </div>
    </div>

    <button id="recommendBtn">Get Recommendations</button>
    <div id="meta" class="meta"></div>
    <div id="results"></div>
  </div>

  <script>
    const ingestBtn = document.getElementById("ingestBtn");
    const ingestStatus = document.getElementById("ingestStatus");
    const recommendBtn = document.getElementById("recommendBtn");
    const meta = document.getElementById("meta");
    const results = document.getElementById("results");

    ingestBtn.addEventListener("click", async () => {
      ingestStatus.textContent = "Running ingestion...";
      try {
        const res = await fetch("/ingest", { method: "POST" });
        const data = await res.json();
        if (!res.ok) {
          ingestStatus.textContent = `Ingestion failed: ${data.detail || "unknown error"}`;
          return;
        }
        ingestStatus.textContent = `Ingestion complete. Raw: ${data.raw_records}, Prepared: ${data.prepared_records}`;
      } catch (err) {
        ingestStatus.textContent = `Ingestion failed: ${err.message}`;
      }
    });

    recommendBtn.addEventListener("click", async () => {
      meta.textContent = "Fetching recommendations...";
      results.innerHTML = "";
      const payload = {
        location: document.getElementById("location").value,
        budget: document.getElementById("budget").value,
        preferred_cuisine: document.getElementById("cuisine").value,
        min_rating: Number(document.getElementById("minRating").value),
        additional_preferences: document.getElementById("addPrefs").value
          .split(",")
          .map(s => s.trim())
          .filter(Boolean),
        top_n: Number(document.getElementById("topN").value)
      };

      try {
        const res = await fetch("/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          meta.textContent = `Request failed: ${data.detail || "unknown error"}`;
          return;
        }

        const relaxed = data.fallback_used ? `Yes (${data.relaxation_steps.join(" ")})` : "No";
        meta.innerHTML = `Returned ${data.returned_count} recommendations. <span class="warn">Fallback used: ${relaxed}</span>`;

        if (!data.recommendations.length) {
          results.innerHTML = "<div class='item'>No recommendations found.</div>";
          return;
        }

        for (const item of data.recommendations) {
          const block = document.createElement("div");
          block.className = "item";
          block.innerHTML = `
            <strong>${item.restaurant_name}</strong><br/>
            Location: ${item.location}<br/>
            Cuisine: ${item.cuisine}<br/>
            Rating: ${item.rating} | Cost: ${item.estimated_cost}<br/>
            Score: ${item.match_score}<br/>
            Reason: ${item.reason}
          `;
          results.appendChild(block);
        }
      } catch (err) {
        meta.textContent = `Request failed: ${err.message}`;
      }
    });
  </script>
</body>
</html>
